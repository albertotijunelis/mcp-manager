name: Generate Demo GIF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build mcp binary
        run: go build -o /usr/local/bin/mcp .

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        run: |
          curl -fsSL https://github.com/charmbracelet/vhs/releases/latest/download/vhs_Linux_x86_64.tar.gz | sudo tar xz -C /usr/local/bin vhs

      - name: Generate GIF
        run: vhs demo.tape

      - name: Commit and push GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo.gif
          git diff --cached --quiet || (git commit -m "docs: generate demo.gif [skip ci]" && git push)
